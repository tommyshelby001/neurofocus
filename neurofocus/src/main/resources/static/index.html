<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NeuroFocus AI Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: #0b1c3d;
            color: white;
            text-align: center;
        }

        .container {
            margin: 50px auto;
            width: 350px;
            padding: 20px;
            border-radius: 15px;
            background: #020d2b;
            box-shadow: 0 0 20px cyan;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px;
            border-radius: 8px;
            border: none;
        }

        button {
            padding: 10px 15px;
            margin: 8px;
            border-radius: 8px;
            border: none;
            background: #2ec4f1;
            cursor: pointer;
        }

        #result {
            margin-top: 15px;
            padding: 10px;
            background: #111;
            border-radius: 8px;
        }
    </style>
</head>

<body>

<h1>🤖 NeuroFocus AI Dashboard</h1>

<div class="container">

    <!-- LOGIN -->
    <h2>🔐 Login</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <br>
    <button onclick="register()">Register</button>
    <button onclick="login()">Login</button>

    <hr>

    <!-- FOCUS -->
    <h2>🎯 Focus</h2>
    <input type="number" id="userId" placeholder="User ID">

    <br>
    <button onclick="startFocus()">Start Focus</button>
    <button onclick="endFocus()">End Focus</button>

    <hr>

    <!-- AI ADVICE -->
    <button onclick="getAdvice()">AI Advice 🤖</button>

    <div id="result"></div>

</div>

<script>

    // REGISTER
    function register() {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        fetch("/register", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({email, password})
        })
        .then(res => res.text())
        .then(data => {
            alert(data);
        });
    }

    // LOGIN
    function login() {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        fetch("/login", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({email, password})
        })
        .then(res => res.text())
        .then(data => {
            alert(data);
        });
    }

    // START FOCUS
    function startFocus() {
        const userId = document.getElementById("userId").value;

        if (!userId) {
            alert("Enter User ID");
            return;
        }

        fetch(`/focus/start/${userId}`)
            .then(res => res.text())
            .then(data => {
                document.getElementById("result").innerText = data;
            });
    }

    // END FOCUS
    function endFocus() {
        const userId = document.getElementById("userId").value;

        if (!userId) {
            alert("Enter User ID");
            return;
        }

        fetch(`/focus/end/${userId}`)
            .then(res => res.text())
            .then(data => {
                document.getElementById("result").innerText = data;
            });
    }

    // AI ADVICE (FIXED)
    function getAdvice() {
        const userId = document.getElementById("userId").value;

        if (!userId) {
            alert("Please enter User ID");
            return;
        }

        fetch(`/smart-advice/${userId}`)
            .then(res => res.text())
            .then(data => {
                document.getElementById("result").innerText = data;
            })
            .catch(err => {
                console.error(err);
                document.getElementById("result").innerText = "Error getting advice";
            });
    }

</script>

</body>
</html>
